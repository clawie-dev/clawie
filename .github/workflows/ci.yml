name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      APP_KEY: ci-app-key-32-bytes-long-string-for-tests
      LOG_LEVEL: warn
      SESSION_DRIVER: memory
      HOST: localhost
      PORT: '3333'
      APP_URL: http://localhost:3333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Mirror-test gate (spec 031)
        run: node --experimental-strip-types scripts/check_mirror_tests.ts

      - name: Run tests
        run: npm test
